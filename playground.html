<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FFA Labs Playground</title>
    <style>
        :root {
            --bg-0: #0b1020;
            --bg-1: #111937;
            --bg-2: #1a2754;
            --panel: rgba(17, 25, 55, 0.86);
            --line: rgba(148, 163, 184, 0.22);
            --text-main: #eef2ff;
            --text-muted: #c7d2fe;
            --accent: #f59e0b;
            --accent-2: #60a5fa;
            --ok: #10b981;
            --danger: #ef4444;
            --shadow: 0 20px 45px -24px rgba(0, 0, 0, 0.62);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at 10% 10%, #1f2f67 0%, transparent 46%),
                radial-gradient(circle at 90% 0%, #203f72 0%, transparent 38%),
                linear-gradient(155deg, var(--bg-0), var(--bg-1), var(--bg-2));
            color: var(--text-main);
            font-family: Inter, "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .page {
            max-width: 1320px;
            margin: 0 auto;
            padding: 26px 18px 22px;
        }

        .hero {
            border: 1px solid var(--line);
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.2), rgba(245, 158, 11, 0.14));
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(1.32rem, 3vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .hero p {
            margin: 8px 0 0;
            color: var(--text-muted);
            line-height: 1.42;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(320px, 390px) 1fr;
            gap: 14px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
        }

        .left {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 140px);
            overflow: auto;
        }

        .label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 0.84rem;
            font-weight: 700;
            letter-spacing: 0.35px;
            text-transform: uppercase;
        }

        .select,
        .button {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.34);
            color: var(--text-main);
            font: inherit;
        }

        .select {
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 12px;
        }

        .button {
            cursor: pointer;
            background: linear-gradient(130deg, #2563eb, #7c3aed);
            padding: 10px 13px;
            font-weight: 700;
            transition: transform 0.15s ease, filter 0.2s ease;
        }

        .button:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.ghost {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.34);
            font-weight: 600;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .list-item {
            border: 1px solid rgba(148, 163, 184, 0.26);
            background: rgba(15, 23, 42, 0.62);
            color: var(--text-main);
            border-radius: 10px;
            padding: 9px 10px;
            text-align: left;
            cursor: pointer;
            transition: all 0.16s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .list-item:hover {
            border-color: rgba(96, 165, 250, 0.7);
            transform: translateX(1px);
            background: rgba(30, 41, 59, 0.86);
        }

        .list-item.active {
            border-color: rgba(245, 158, 11, 0.9);
            background: rgba(51, 65, 85, 0.92);
        }

        .pill {
            font-size: 0.72rem;
            line-height: 1;
            border-radius: 999px;
            padding: 5px 7px;
            font-weight: 800;
        }

        .pill.ok {
            background: rgba(16, 185, 129, 0.2);
            color: #86efac;
            border: 1px solid rgba(16, 185, 129, 0.45);
        }

        .pill.missing {
            background: rgba(239, 68, 68, 0.16);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .right {
            padding: 12px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 10px;
            min-height: 640px;
        }

        .preview-top {
            display: grid;
            grid-template-columns: minmax(250px, 1fr) 1fr;
            gap: 10px;
        }

        .thumb-shell,
        .meta,
        .app-shell {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            overflow: hidden;
        }

        .thumb-shell img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            display: block;
            background: #0f172a;
        }

        .thumb-caption {
            padding: 9px 11px;
            font-size: 0.83rem;
            color: #b8c5ea;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }

        .meta {
            padding: 12px;
        }

        .meta h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        .app-shell {
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }

        .app-head {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            color: #c2d1f5;
            font-size: 0.86rem;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .app-head button {
            border: 1px solid rgba(96, 165, 250, 0.6);
            background: rgba(37, 99, 235, 0.2);
            color: #dbeafe;
            border-radius: 8px;
            padding: 5px 9px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .embed-head {
            padding: 10px 0 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            color: #c2d1f5;
            font-size: 0.86rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .height-group {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #d7e2ff;
            font-size: 0.84rem;
            font-weight: 600;
        }

        .height-group input {
            width: 90px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.34);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            padding: 5px 8px;
            font: inherit;
        }

        .embed-head button {
            border: 1px solid rgba(96, 165, 250, 0.6);
            background: rgba(37, 99, 235, 0.2);
            color: #dbeafe;
            border-radius: 8px;
            padding: 5px 9px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .embed-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0 0;
            height: 100%;
        }

        .embed-body p {
            margin: 0;
            color: #bfd0f5;
            font-size: 0.89rem;
        }

        .embed-code {
            flex: 1;
            width: 100%;
            min-height: 140px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(2, 6, 23, 0.9);
            color: #e2e8f0;
            padding: 12px;
            font-family: "Cascadia Code", Consolas, Menlo, Monaco, monospace;
            font-size: 0.84rem;
            line-height: 1.5;
            resize: vertical;
            white-space: pre;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: 0;
            background: #ffffff;
        }

        @media (max-width: 1000px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .left {
                max-height: none;
            }

            .preview-top {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero panel">
            <h1>FFA Labs Playground</h1>
            <p>Browse each single-page app, preview screenshots, and launch experiences directly in this portal.</p>
        </section>

        <section class="layout">
            <aside class="left panel">
                <div>
                    <label class="label">Available Apps</label>
                    <div id="app-list" class="list"></div>
                </div>
            </aside>

            <section class="right panel">
                <div class="preview-top">
                    <div class="thumb-shell">
                        <img id="preview-image" alt="App screenshot preview">
                        <div class="thumb-caption" id="thumb-caption">Hover an app title to preview its screenshot.</div>
                    </div>

                    <div class="meta">
                        <h2 id="preview-title">No app selected</h2>
                        <div class="embed-head">
                            <label class="height-group" for="embed-height">
                                Height
                                <input id="embed-height" type="number" min="100" step="10" value="300">
                            </label>
                            <button id="copy-embed" type="button">Copy Embed Code</button>
                        </div>
                        <div class="embed-body">
                            <textarea id="embed-code" class="embed-code" spellcheck="false" readonly></textarea>
                        </div>
                    </div>
                </div>

                <div class="app-shell">
                    <div class="app-head">
                        <span id="loaded-label">No app loaded</span>
                        <button id="open-new-tab" type="button">Open in New Tab</button>
                    </div>
                    <iframe id="app-frame" title="FFA App Preview"></iframe>
                </div>
            </section>
        </section>
    </main>

    <script>
        const DATA_SOURCE = "playground-apps.json";
        const FALLBACK_TITLES = ["email-the-dean", "discord-invite", "resources", "tokens"];

        const elements = {
            list: document.getElementById("app-list"),
            image: document.getElementById("preview-image"),
            caption: document.getElementById("thumb-caption"),
            previewTitle: document.getElementById("preview-title"),
            loadedLabel: document.getElementById("loaded-label"),
            frame: document.getElementById("app-frame"),
            openNewTab: document.getElementById("open-new-tab"),
            embedHeight: document.getElementById("embed-height"),
            embedCode: document.getElementById("embed-code"),
            copyEmbed: document.getElementById("copy-embed")
        };

        const EMBED_BASE_URL = "https://future-fiction-academy.github.io/ffa-course-labs";
        let titles = [];
        let selectedTitle = "";

        function formatTitle(slug) {
            return slug
                .split("-")
                .filter(Boolean)
                .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                .join(" ");
        }

        function normalizeTitles(values) {
            return values
                .map((item) => String(item).trim())
                .filter(Boolean)
                .filter((value, index, arr) => arr.indexOf(value) === index);
        }

        function appPaths(slug) {
            return {
                html: `${slug}.html`,
                screenshot: `screenshots/${slug}.png`
            };
        }

        function buildEmbedCode(slug, height) {
            const pretty = formatTitle(slug);
            return `<iframe
  src="${EMBED_BASE_URL}/${slug}.html"
  width="100%"
  height="${height}"
  style="border:0; border-radius:12px; overflow:hidden;"
  loading="lazy"
  title="${pretty}">
</iframe>`;
        }

        function updateEmbedCode() {
            if (!selectedTitle) {
                elements.embedCode.value = "";
                return;
            }
            const heightValue = Number.parseInt(elements.embedHeight.value, 10);
            const safeHeight = Number.isFinite(heightValue) && heightValue >= 100 ? heightValue : 300;
            elements.embedHeight.value = String(safeHeight);
            elements.embedCode.value = buildEmbedCode(selectedTitle, safeHeight);
        }

        function updatePreview(slug, context) {
            if (!slug) {
                elements.previewTitle.textContent = "No app selected";
                elements.image.removeAttribute("src");
                elements.image.alt = "No screenshot selected";
                elements.caption.textContent = "Hover an app title to preview its screenshot.";
                return;
            }

            const paths = appPaths(slug);
            const pretty = formatTitle(slug);
            elements.previewTitle.textContent = pretty;
            elements.image.src = paths.screenshot;
            elements.image.alt = `${pretty} screenshot`;
            elements.caption.textContent = `${pretty} screenshot preview`;
        }

        function setSelected(slug) {
            selectedTitle = slug;
            const paths = appPaths(slug);
            elements.frame.src = paths.html;
            elements.loadedLabel.textContent = `Loaded: ${paths.html}`;
            updateEmbedCode();
            updatePreview(slug, "selected");

            Array.from(elements.list.children).forEach((button) => {
                button.classList.toggle("active", button.dataset.slug === slug);
            });
        }

        function createListItem(slug) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "list-item";
            button.dataset.slug = slug;
            button.innerHTML = `
                <span>${formatTitle(slug)}</span>
                <span class="pill ok">ready</span>
            `;

            button.addEventListener("mouseenter", () => {
                updatePreview(slug, "hover");
            });

            button.addEventListener("mouseleave", () => {
                updatePreview(selectedTitle || "", selectedTitle ? "selected" : "");
            });

            button.addEventListener("click", () => setSelected(slug));
            return button;
        }

        function renderTitles() {
            elements.list.innerHTML = "";

            titles.forEach((slug) => {
                elements.list.appendChild(createListItem(slug));
            });

            if (titles.length > 0) {
                setSelected(titles[0]);
            } else {
                selectedTitle = "";
                elements.loadedLabel.textContent = "No app loaded";
                elements.frame.removeAttribute("src");
                elements.embedCode.value = "";
                updatePreview("", "");
            }
        }

        async function loadTitlesFromJson() {
            try {
                const response = await fetch(DATA_SOURCE, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Request failed with ${response.status}`);
                }
                const payload = await response.json();
                if (!payload || !Array.isArray(payload.titles)) {
                    throw new Error("JSON must include a titles array");
                }
                const cleaned = normalizeTitles(payload.titles);
                if (!cleaned.length) {
                    throw new Error("No valid titles in JSON");
                }
                return cleaned;
            } catch (error) {
                console.warn(`Could not read ${DATA_SOURCE}; using fallback list`, error);
                return FALLBACK_TITLES.slice();
            }
        }

        elements.embedHeight.addEventListener("input", () => {
            updateEmbedCode();
        });

        elements.copyEmbed.addEventListener("click", async () => {
            if (!selectedTitle) return;
            try {
                await navigator.clipboard.writeText(elements.embedCode.value);
                elements.copyEmbed.textContent = "Copied!";
                window.setTimeout(() => {
                    elements.copyEmbed.textContent = "Copy Embed Code";
                }, 1300);
            } catch (error) {
                elements.copyEmbed.textContent = "Copy Failed";
                window.setTimeout(() => {
                    elements.copyEmbed.textContent = "Copy Embed Code";
                }, 1300);
            }
        });

        elements.openNewTab.addEventListener("click", () => {
            if (!selectedTitle) return;
            const paths = appPaths(selectedTitle);
            window.open(paths.html, "_blank", "noopener,noreferrer");
        });

        elements.image.addEventListener("error", () => {
            elements.caption.textContent = "Screenshot not found for this title.";
            elements.image.removeAttribute("src");
        });

        elements.frame.addEventListener("error", () => {
            elements.loadedLabel.textContent = "Could not load selected app";
        });

        async function init() {
            titles = await loadTitlesFromJson();
            renderTitles();
        }

        init();
    </script>
</body>
</html>
