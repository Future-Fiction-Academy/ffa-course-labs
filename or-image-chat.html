<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────────
  const COACH_MODEL         = 'openai/gpt-5-mini';
  const COACH_MODEL_DISPLAY = 'GPT-5 Mini (OpenAI)';

  // Rough generation time hints per model family (from live integration tests).
  // Shown in the "Generating…" system note so students aren't left wondering.
  const MODEL_WAIT_HINTS = [
    { match: 'gemini-2.5-flash-image',          label: '~8 seconds'  },
    { match: 'gemini-3.1-flash-image-preview',   label: '~15 seconds' },
    { match: 'gemini-3-pro-image-preview',       label: '~25 seconds' },
    { match: 'gpt-5-image-mini',                 label: '~60 seconds' },
    { match: 'gpt-5-image',                      label: '~50 seconds' },
  ];

  function modelWaitHint() {
    const id  = modelSel.value || '';
    const hit = MODEL_WAIT_HINTS.find(h => id.includes(h.match));
    return hit ? ' (usually ' + hit.label + ')' : '';
  }

  // System prompt is built dynamically at session start so it includes the
  // specific image model name and model-family prompting hints.
  function buildSystemPrompt(imageModelName, imageModelId) {
    // Brief model-specific prompting advice so the coach gives relevant guidance
    let modelHints = 'Be specific about visual elements, style, mood, lighting, and composition.';
    if (imageModelId.includes('gemini')) {
      modelHints = `${imageModelName} responds well to rich scene descriptions, mood language, and named artistic styles (e.g. "cinematic", "watercolor", "photorealistic"). It supports aspect ratio control via the API.`;
    } else if (imageModelId.includes('gpt-5-image')) {
      modelHints = `${imageModelName} excels at following detailed instructions, rendering text inside images, and maintaining consistent style. Be very explicit about every visual element you want.`;
    } else if (imageModelId.includes('flux')) {
      modelHints = `${imageModelName} responds best to comma-separated descriptive tags combined with natural language. Include lighting, medium, camera angle, and style keywords.`;
    }

    return `You are an Image Prompt Tutor inside a creative writing and AI course.
You are powered by ${COACH_MODEL_DISPLAY}.
The image generation model for this session is: ${imageModelName}.

Prompting notes for ${imageModelName}:
${modelHints}


Your coaching style:
1. When the student describes an image idea, immediately craft a complete example prompt. Present it clearly on its own line, wrapped in quotes.
2. Below the prompt, add a short educational analysis in this exact format:
   **Why this prompt works:**
   - [reason 1]
   - [reason 2]
   - [reason 3]
   **What could be improved:**
   - [improvement 1]
   - [improvement 2]
3. Then ask: "Would you like to modify this prompt, or shall I go ahead and generate it?"
4. If they want changes, revise the prompt and show the analysis again for the new version.
5. When ready, output EXACTLY this on its own line (nothing after it):
GENERATE: [the final refined prompt]

After an image is generated you will receive a note. Ask warmly if they like it. Then offer them two clear choices:
1. **Try a variation** — suggest one specific change that could make the image more interesting (different lighting, mood, style, or composition).
2. **Start fresh** — invite them to describe a completely different image idea.

Keep it brief — 3 sentences maximum. No repeated analysis.`;

  }

  // ── Elements ──────────────────────────────────────────────────────────────────
  const panel     = document.getElementById('oic-panel');
  const keyInput  = document.getElementById('oic-key-input');
  const keyBtn    = document.getElementById('oic-key-btn');
  const statusEl  = document.getElementById('oic-status');
  const chatEl    = document.getElementById('oic-chat');
  const modelSel  = document.getElementById('oic-model-select');
  const reloadBtn = document.getElementById('oic-reload-btn');
  const startBtn  = document.getElementById('oic-start-btn');
  const promptEl  = document.getElementById('oic-prompt');
  const sendBtn   = document.getElementById('oic-send-btn');
  const stopBtn   = document.getElementById('oic-stop-btn');
  const themeBtn  = document.getElementById('oic-theme-btn');
  const genBtn    = document.getElementById('oic-gen-btn');
  const clearBtn  = document.getElementById('oic-clear-btn');
  const exportBtn = document.getElementById('oic-export-btn');
  const usageEl   = document.getElementById('oic-usage');

  // ── State ─────────────────────────────────────────────────────────────────────
  let apiKey      = null;
  let isBusy      = false;
  let isDay       = true;
  let sessionLive = false;  // true after Start Chatting is clicked
  let modelMeta   = {};     // id → { modalities }

  // Session-scoped system prompt (built at Start Chatting time with model identity)
  let sessionSystemPrompt = '';

  // AbortController for the current in-flight fetch (coach or image)
  let currentAbort = null;

  // Coach model pricing (fetched at key entry time)
  let coachPricing = { inp: 0, out: 0 };

  // Running session token / image totals (reset on Clear)
  let sessionStats = { promptTokens: 0, completionTokens: 0, imageCount: 0 };

  // API history (text only — no image data ever sent to the coach model)
  let apiMessages    = [];

  // Display history (for UI rendering + ZIP export — includes imageUrl)
  let displayHistory = [];

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function setStatus(msg, type) {
    statusEl.textContent = msg || '';
    statusEl.style.color = { error: '#fca5a5', ok: '#a7f3d0' }[type] || 'var(--oic-muted)';
  }

  function setBusy(busy) {
    isBusy             = busy;
    sendBtn.disabled   = busy || !sessionLive;
    promptEl.disabled  = busy || !sessionLive;
    genBtn.disabled    = busy || !sessionLive;
    keyBtn.disabled    = busy;
    reloadBtn.disabled = busy || !apiKey;
    startBtn.disabled  = busy || !apiKey || !modelSel.value || sessionLive;
    modelSel.disabled  = busy || sessionLive;
    stopBtn.classList.toggle('visible', busy);
  }

  function scrollChat() { chatEl.scrollTop = chatEl.scrollHeight; }

  // Simple markdown → HTML
  function md(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*<\/li>)/g, '<ul style="margin:6px 0 0 14px;padding:0;">$1</ul>')
      .replace(/\n/g, '<br>');
  }

  // ── Stop ──────────────────────────────────────────────────────────────────────
  stopBtn.addEventListener('click', function () {
    if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  });

  // ── Theme ─────────────────────────────────────────────────────────────────────
  themeBtn.addEventListener('click', function () {
    isDay = !isDay;
    panel.classList.toggle('oic-day', isDay);
    themeBtn.textContent = isDay ? '🌙' : '☀️';
  });

  // ── Pricing formatter ($X.XXX / M tokens) ─────────────────────────────────────
  function fmtPrice(raw) {
    const v = parseFloat(raw);
    if (!v || v <= 0) return null;
    return '$' + (v * 1_000_000).toFixed(3);
  }

  function hasTokenPricing(m) {
    // Exclude models that only do per-image pricing (prompt=0 AND completion=0)
    const inp = parseFloat(m.pricing?.prompt || 0);
    const out = parseFloat(m.pricing?.completion || 0);
    return inp > 0 || out > 0;
  }

  function modelOptionText(m) {
    const inP  = fmtPrice(m.pricing?.prompt);
    const outP = fmtPrice(m.pricing?.completion);
    const parts = [];
    if (inP)  parts.push(inP  + '/M in');
    if (outP) parts.push(outP + '/M out');
    return m.name + (parts.length ? '  ·  ' + parts.join('  ') : '');
  }

  // ── Fetch image models ────────────────────────────────────────────────────────
  // Filter: must have image in output_modalities AND have token-based pricing.
  async function fetchModels() {
    if (!apiKey) return;
    modelSel.disabled  = true;
    reloadBtn.disabled = true;
    startBtn.disabled  = true;
    setStatus('Loading image models…', 'neutral');

    try {
      const res = await fetch(
        'https://openrouter.ai/api/v1/models?output_modalities=image&order=most-popular',
        { headers: { 'Authorization': 'Bearer ' + apiKey } }
      );
      if (!res.ok) throw new Error('Status ' + res.status);

      const json   = await res.json();
      const models = (json.data || []).filter(m => {
        const outMods = m.architecture?.output_modalities || [];
        return outMods.includes('image') && hasTokenPricing(m);
      });

      if (!models.length) throw new Error('No image models with token pricing found.');

      modelMeta = {};
      models.forEach(m => {
        const outMods = m.architecture?.output_modalities || ['image'];
        modelMeta[m.id] = { modalities: outMods.includes('text') ? ['image', 'text'] : ['image'] };
      });

      modelSel.innerHTML = '';
      models.forEach(m => {
        const opt       = document.createElement('option');
        opt.value       = m.id;
        opt.textContent = modelOptionText(m);
        modelSel.appendChild(opt);
      });

      modelSel.disabled  = false;
      reloadBtn.disabled = false;
      startBtn.disabled  = false;
      setStatus(models.length + ' image models loaded. Choose one, then click Start Chatting.', 'ok');

    } catch (err) {
      console.error('[oic] fetchModels:', err);
      setStatus('Could not load models: ' + err.message, 'error');
      modelSel.disabled  = false;
      reloadBtn.disabled = false;
    }
  }

  // ── Key submission ────────────────────────────────────────────────────────────
  keyBtn.addEventListener('click', activateKey);
  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); activateKey(); } });

  function activateKey() {
    const val = keyInput.value.trim();
    if (!val) { setStatus('Paste your API key first.', 'error'); return; }
    apiKey = val;
    keyInput.value = '';
    setStatus('Key stored — fetching models…', 'ok');
    fetchModels();
    fetchCoachPricing(); // parallel — gets per-token pricing for the cost estimator
  }

  reloadBtn.addEventListener('click', fetchModels);

  // ── Fetch coach model pricing ────────────────────────────────────────────────────
  // Runs in parallel with fetchModels so it doesn't block the key entry flow.
  async function fetchCoachPricing() {
    try {
      const res  = await fetch('https://openrouter.ai/api/v1/models', {
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      if (!res.ok) return;
      const json = await res.json();
      const m    = (json.data || []).find(m => m.id === COACH_MODEL);
      if (m) {
        coachPricing.inp = parseFloat(m.pricing?.prompt || 0);
        coachPricing.out = parseFloat(m.pricing?.completion || 0);
      }
    } catch (_) { /* silent — cost display just won't show pricing */ }
  }

  // ── Start Chatting ────────────────────────────────────────────────────────────
  startBtn.addEventListener('click', startSession);

  async function startSession() {
    if (!apiKey || !modelSel.value || isBusy) return;

    const selectedOpt    = modelSel.options[modelSel.selectedIndex];
    const imageModelName = (selectedOpt?.text || 'selected image model').split('·')[0].trim();
    const imageModelId   = modelSel.value;

    // Build the session-scoped system prompt now that we know the image model
    sessionSystemPrompt = buildSystemPrompt(imageModelName, imageModelId);

    setBusy(true);
    sessionLive = true;
    startBtn.disabled = true;

    chatEl.innerHTML = '';
    apiMessages      = [];
    displayHistory   = [];
    setStatus('Connecting to your coach…', 'neutral');

    const typingRow = appendTypingRow();

    try {
      // Hidden setup turn: not added to apiMessages or displayHistory.
      // Gives the coach its persona, model identity, and prompts a warm intro.
      const greeting = await callCoach([
        { role: 'system', content: sessionSystemPrompt },
        {
          role: 'user',
          content:
            '[Session start — do not acknowledge this line]\n' +
            'Greet the student. Briefly introduce yourself as their Image Prompt Tutor, ' +
            'mention you are powered by ' + COACH_MODEL_DISPLAY + ', and that you will generate images ' +
            'using ' + imageModelName + '. Then ask what kind of image they are imagining. ' +
            'Warm, friendly, under 4 sentences.'
        }
      ]);

      resolveTypingWithText(typingRow, greeting);
      // Store greeting in both histories so the coach remembers its own intro in later turns
      displayHistory.push({ role: 'assistant', text: greeting });
      apiMessages.push({ role: 'assistant', content: greeting });

      promptEl.disabled = false;
      sendBtn.disabled  = false;
      genBtn.disabled   = false;
      promptEl.focus();
      setStatus('Session started! Describe what you want to create.', 'ok');

    } catch (err) {
      resolveTypingWithError(typingRow, err.message);
      sessionLive = false;
      startBtn.disabled = false;
      setStatus('Failed to start session — try again.', 'error');
    } finally {
      setBusy(false);
    }
  }

  // ── Chat rendering ────────────────────────────────────────────────────────────
  function appendUserBubble(text) {
    const row = document.createElement('div');
    row.className = 'oic-row user';
    const av = document.createElement('div');
    av.className = 'oic-avatar user'; av.textContent = 'You';
    const b = document.createElement('div');
    b.className = 'oic-bubble'; b.textContent = text;
    row.append(b, av);
    chatEl.appendChild(row); scrollChat();
  }

  function appendTypingRow() {
    const row = document.createElement('div');
    row.className = 'oic-row';
    const av = document.createElement('div');
    av.className = 'oic-avatar'; av.textContent = 'AI';
    const b = document.createElement('div');
    b.className = 'oic-bubble';
    b.innerHTML = '<div class="oic-typing"><span></span><span></span><span></span></div>';
    row.append(av, b);
    chatEl.appendChild(row); scrollChat();
    return row;
  }

  function resolveTypingWithText(row, text) {
    row.querySelector('.oic-bubble').innerHTML = md(text); scrollChat();
  }

  function resolveTypingWithImage(row, imageUrl, promptUsed) {
    const b = row.querySelector('.oic-bubble');
    const safe = promptUsed.replace(/"/g, '&quot;').slice(0, 120);
    b.innerHTML =
      '<img src="' + imageUrl + '" alt="' + safe + '" loading="lazy" />' +
      '<small>Right-click → Save image as… to download.</small>';
    scrollChat();
  }

  function resolveTypingWithError(row, msg) {
    const b = row.querySelector('.oic-bubble');
    b.style.color = '#fca5a5';
    b.textContent = '⚠ ' + msg;
    scrollChat();
  }

  function appendSystemNote(text) {
    const row = document.createElement('div');
    row.className = 'oic-row';
    const av = document.createElement('div');
    av.className = 'oic-avatar';
    av.style.background = 'radial-gradient(circle, #f59e0b, #d97706)';
    av.textContent = '⚙';
    const b = document.createElement('div');
    b.className = 'oic-bubble system'; b.textContent = text;
    row.append(av, b);
    chatEl.appendChild(row); scrollChat();
  }

  // ── Extract image URL from OpenRouter image response ──────────────────────────
  function extractImageUrl(data) {
    const msg = data?.choices?.[0]?.message;
    if (Array.isArray(msg?.images) && msg.images.length) {
      const u = msg.images[0]?.image_url?.url;
      if (u) return u;
    }
    if (Array.isArray(msg?.content)) {
      for (const p of msg.content) {
        if (p.type === 'image_url' && p.image_url?.url) return p.image_url.url;
      }
    }
    const d0 = data?.data?.[0];
    if (d0?.url)      return d0.url;
    if (d0?.b64_json) return 'data:image/png;base64,' + d0.b64_json;
    return null;
  }

  // ── Update usage display ──────────────────────────────────────────────────────
  function updateUsageDisplay() {
    const total = sessionStats.promptTokens + sessionStats.completionTokens;
    if (!total && !sessionStats.imageCount) { usageEl.innerHTML = ''; return; }

    const cost = sessionStats.promptTokens     * coachPricing.inp
               + sessionStats.completionTokens * coachPricing.out;
    const costStr = (coachPricing.inp > 0)
      ? ' · <span class="oic-usage-cost">~$' + cost.toFixed(4) + '</span>'
      : '';

    let html = '<div class="oic-usage-seg">'
      + '💬 Coach: ' + total.toLocaleString() + ' tokens' + costStr
      + '</div>';

    if (sessionStats.imageCount) {
      html += '<div class="oic-usage-seg">'
        + '🖼️ ' + sessionStats.imageCount
        + ' image' + (sessionStats.imageCount !== 1 ? 's' : '') + ' generated'
        + '</div>';
    }

    usageEl.innerHTML = html;
  }

  // ── API callers ───────────────────────────────────────────────────────────────
  async function callCoach(messages) {
    currentAbort = new AbortController();
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      signal: currentAbort.signal,
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type':  'application/json',
        'HTTP-Referer':   window.location.origin || 'https://example.com',
        'X-Title':        'FFA Image Prompt Tutor'
      },
      body: JSON.stringify({ model: COACH_MODEL, messages })
    });
    currentAbort = null;
    if (!res.ok) {
      let d = ''; try { d = (await res.json()).error?.message || ''; } catch (_) {}
      throw new Error('Coach API ' + res.status + (d ? ': ' + d : ''));
    }
    const data = await res.json();
    // Capture token usage for the live cost display
    if (data.usage) {
      sessionStats.promptTokens     += (data.usage.prompt_tokens     || 0);
      sessionStats.completionTokens += (data.usage.completion_tokens || 0);
      updateUsageDisplay();
    }
    return data.choices?.[0]?.message?.content || '';
  }

  async function callImageModel(prompt) {
    const model = modelSel.value;
    if (!model) throw new Error('No image model selected.');
    const mods = modelMeta[model]?.modalities || ['image'];
    currentAbort = new AbortController();
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      signal: currentAbort.signal,
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type':  'application/json',
        'HTTP-Referer':   window.location.origin || 'https://example.com',
        'X-Title':        'FFA Image Prompt Tutor'
      },
      body: JSON.stringify({ model, modalities: mods, messages: [{ role: 'user', content: prompt }] })
    });
    currentAbort = null;
    if (!res.ok) {
      let d = ''; try { d = (await res.json()).error?.message || ''; } catch (_) {}
      throw new Error('Image API ' + res.status + (d ? ': ' + d : ''));
    }
    return res.json();
  }

  // ── Main send ─────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const userText = promptEl.value.trim();
    if (!userText || isBusy || !sessionLive) return;

    setBusy(true);
    promptEl.value = '';
    setStatus('Thinking…', 'neutral');

    appendUserBubble(userText);
    displayHistory.push({ role: 'user', text: userText });
    apiMessages.push({ role: 'user', content: userText });

    const coachPayload = [{ role: 'system', content: sessionSystemPrompt }, ...apiMessages];
    const typingRow    = appendTypingRow();

    try {
      const coachReply = await callCoach(coachPayload);
      const genMatch   = coachReply.match(/^GENERATE:\s*(.+)$/mi);

      if (genMatch) {
        const imagePrompt = genMatch[1].trim();
        const textBefore  = coachReply.slice(0, genMatch.index).trim();

        if (textBefore) {
          resolveTypingWithText(typingRow, textBefore);
          displayHistory.push({ role: 'assistant', text: textBefore });
          apiMessages.push({ role: 'assistant', content: textBefore });
        } else {
          resolveTypingWithText(typingRow, 'Great — generating your image now…');
        }

        appendSystemNote(
          '⏳ Generating' + modelWaitHint() + ': "​' +
          imagePrompt.slice(0, 80) + (imagePrompt.length > 80 ? '…' : '') + '"'
        );
        setStatus('Generating image…' + modelWaitHint(), 'neutral');
        const imgTypingRow = appendTypingRow();

        try {
          const imgData  = await callImageModel(imagePrompt);
          const imageUrl = extractImageUrl(imgData);
          if (!imageUrl) {
            console.warn('[oic] Image response:', JSON.stringify(imgData, null, 2));
            throw new Error('No image in response. See console for raw output.');
          }

          resolveTypingWithImage(imgTypingRow, imageUrl, imagePrompt);
          displayHistory.push({ role: 'assistant', text: '[Image generated]', imageUrl });
          sessionStats.imageCount++;
          updateUsageDisplay();

          // Coach history: describe the image in text — never send the URL
          const imageNote = '[Image generated successfully using prompt: "' + imagePrompt + '"]';
          apiMessages.push({ role: 'assistant', content: 'GENERATE: ' + imagePrompt });

          setStatus('Getting feedback…', 'neutral');
          const feedbackPayload = [
            { role: 'system', content: sessionSystemPrompt },
            ...apiMessages,
            { role: 'user', content: imageNote + ' Now ask if the student likes it and offer 2-3 specific modification suggestions.' }
          ];

          const feedbackRow   = appendTypingRow();
          const feedbackReply = await callCoach(feedbackPayload);
          resolveTypingWithText(feedbackRow, feedbackReply);

          displayHistory.push({ role: 'assistant', text: feedbackReply });
          apiMessages.push({ role: 'user',      content: imageNote });
          apiMessages.push({ role: 'assistant', content: feedbackReply });

          setStatus('Image ready! Reply to refine or try something new.', 'ok');

        } catch (imgErr) {
          resolveTypingWithError(imgTypingRow, imgErr.message);
          setStatus('Image generation failed — see bubble.', 'error');
        }

      } else {
        resolveTypingWithText(typingRow, coachReply);
        displayHistory.push({ role: 'assistant', text: coachReply });
        apiMessages.push({ role: 'assistant', content: coachReply });
        setStatus('', 'neutral');
      }

    } catch (err) {
      if (err.name === 'AbortError') {
        resolveTypingWithError(typingRow, 'Stopped.');
        setStatus('Generation stopped.', 'neutral');
      } else {
        console.error('[oic]', err);
        resolveTypingWithError(typingRow, err.message);
        setStatus('Error — see bubble above.', 'error');
      }
    } finally {
      setBusy(false);
    }
  }

  // ── Generate quick-action ──────────────────────────────────────────────────────
  // Sends the standard approval message so students don't have to type it.
  genBtn.addEventListener('click', function () {
    promptEl.value = 'I like your suggestion. Please generate the image.';
    sendMessage();
  });

  // ── Clear ─────────────────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', function () {
    apiMessages    = [];
    displayHistory = [];
    sessionStats   = { promptTokens: 0, completionTokens: 0, imageCount: 0 };
    sessionLive    = false;
    usageEl.innerHTML = '';
    chatEl.innerHTML = '<div class="oic-empty">Session cleared. Click Start Chatting to begin a new session.</div>';
    promptEl.disabled = true;
    sendBtn.disabled  = true;
    startBtn.disabled = !apiKey || !modelSel.value;
    modelSel.disabled = false;
    setStatus('', 'neutral');
  });

  // ── Export ZIP ────────────────────────────────────────────────────────────────
  // Session transcript goes in session.md; each image is a separate file in images/.
  // Image data URLs are extracted to binary — not embedded in the markdown.
  exportBtn.addEventListener('click', async function () {
    if (!displayHistory.length) { setStatus('Nothing to export yet.', 'error'); return; }
    if (typeof JSZip === 'undefined') { setStatus('JSZip not loaded — check your connection.', 'error'); return; }

    setStatus('Building ZIP…', 'neutral');
    const date       = new Date().toISOString().slice(0, 10);
    const modelLabel = (modelSel.options[modelSel.selectedIndex]?.text || 'Unknown').split('·')[0].trim();

    const zip       = new JSZip();
    const imgFolder = zip.folder('images');

    let md_text = '# Image Prompt Tutor — Session Export\n\n';
    md_text += '**Date:** ' + date + '  \n';
    md_text += '**Coach:** ' + COACH_MODEL_DISPLAY + '  \n';
    md_text += '**Image model:** ' + modelLabel + '\n\n---\n\n';

    let imageIndex = 0;

    for (const h of displayHistory) {
      if (h.role === 'user') {
        md_text += '**You:** ' + h.text + '\n\n';
      } else if (h.imageUrl) {
        imageIndex++;
        const filename = 'image-' + String(imageIndex).padStart(3, '0') + '.png';

        try {
          if (h.imageUrl.startsWith('data:')) {
            // Base64 data URL → extract binary
            const base64 = h.imageUrl.split(',')[1];
            imgFolder.file(filename, base64, { base64: true });
          } else {
            // Remote URL → fetch and store as binary
            const imgRes = await fetch(h.imageUrl);
            const buf    = await imgRes.arrayBuffer();
            imgFolder.file(filename, buf);
          }
          md_text += '**AI:** *(Image generated — see images/' + filename + ')*\n\n';
          md_text += '![Image ' + imageIndex + '](images/' + filename + ')\n\n';
        } catch (fetchErr) {
          md_text += '**AI:** *(Image could not be saved: ' + fetchErr.message + ')*\n\n';
        }
      } else {
        md_text += '**AI:** ' + h.text + '\n\n';
      }
    }

    zip.file('session.md', md_text);

    try {
      const blob = await zip.generateAsync({ type: 'blob' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'prompt-session-' + date + '.zip';
      a.click();
      URL.revokeObjectURL(url);
      setStatus('ZIP downloaded — ' + imageIndex + ' image(s) + session.md', 'ok');
    } catch (zipErr) {
      setStatus('ZIP generation failed: ' + zipErr.message, 'error');
    }
  });

  // ── Input events ──────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);
  promptEl.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });

  // ── iframe height reporter ────────────────────────────────────────────────────
  function postHeight() {
    try { window.parent.postMessage({ type: 'ffa-resize', height: document.documentElement.scrollHeight }, '*'); }
    catch (_) {}
  }
  window.addEventListener('load', postHeight);
  new ResizeObserver(postHeight).observe(document.body);

})();
</script>

</body>
</html>
