<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Author Dashboard</title>
  <style>
  .ad-wrap *, .ad-wrap *::before, .ad-wrap *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .ad-wrap button { font-family: inherit; }

  .ad-wrap ::-webkit-scrollbar { width: 6px; }
  .ad-wrap ::-webkit-scrollbar-track { background: #2D1B33; }
  .ad-wrap ::-webkit-scrollbar-thumb { background: #4A2C5E; border-radius: 3px; }

  .ad-wrap {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Calibri, sans-serif;
    background: #1B0F22;
    color: #D4C8E0;
    font-size: 13px;
    max-width: 1100px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
  }

  .ad-topbar {
    background: #2D1B33;
    border-bottom: 1px solid rgba(201,168,76,0.27);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .ad-topbar h1 {
    margin: 0;
    font-size: 22px;
    font-family: Georgia, serif;
    color: #C9A84C;
  }

  .ad-topbar-meta {
    font-size: 11px;
    color: #8B7A9E;
    margin-top: 3px;
  }

  .ad-topbar-right {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .ad-body {
    display: flex;
    min-height: 600px;
  }

  /* ── Sidebar ── */
  .ad-sidebar {
    width: 210px;
    flex-shrink: 0;
    background: #2D1B33;
    border-right: 1px solid rgba(123,82,153,0.27);
    padding: 16px 12px;
    overflow-y: auto;
  }

  .ad-sidebar-label {
    font-size: 10px;
    color: #8B7A9E;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .ad-phase-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 11px;
    transition: background 0.2s;
  }

  .ad-phase-progress {
    height: 3px;
    background: #3a2a4a;
    border-radius: 2px;
    margin-top: 4px;
  }

  /* ── Main content ── */
  .ad-main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }

  .ad-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(123,82,153,0.27);
    padding-bottom: 12px;
  }

  .ad-tab-btn {
    padding: 7px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: background 0.2s;
  }

  /* ── Cards ── */
  .ad-card {
    background: #4A2C5E;
    border: 1px solid #7B5299;
    border-radius: 8px;
    padding: 16px;
  }

  .ad-card-label {
    font-size: 11px;
    color: #8B7A9E;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .ad-logline-card {
    background: #4A2C5E;
    border: 1px solid #7B5299;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
    border-left: 4px solid #C9A84C;
  }

  /* ── Task items ── */
  .ad-task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    margin-bottom: 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }

  /* ── Stat cards row ── */
  .ad-stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .ad-stat-card {
    background: #4A2C5E;
    border-radius: 8px;
    padding: 14px 18px;
    min-width: 130px;
  }

  .ad-stat-value {
    font-size: 22px;
    font-weight: bold;
    font-family: Georgia, serif;
  }

  .ad-stat-label {
    font-size: 11px;
    color: #8B7A9E;
    margin-top: 2px;
  }

  .ad-stat-sub {
    font-size: 10px;
    color: #C9A84C;
    margin-top: 3px;
  }

  /* ── Grid layouts ── */
  .ad-grid-2col {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .ad-grid-analytics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .ad-grid-full {
    grid-column: 1 / -1;
  }

  /* ── Phase timeline ── */
  .ad-timeline {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .ad-timeline-bar {
    height: 28px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .ad-timeline-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #F5F0EB;
    font-weight: bold;
  }

  .ad-timeline-label {
    font-size: 8px;
    color: #8B7A9E;
    text-align: center;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Avatar ── */
  .ad-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #4A2C5E;
    border: 3px solid #C9A84C;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #C9A84C;
    font-weight: bold;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .ad-body { flex-direction: column; }
    .ad-sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(123,82,153,0.27); max-height: 200px; }
    .ad-grid-2col { grid-template-columns: 1fr; }
    .ad-grid-analytics { grid-template-columns: 1fr; }
  }
  </style>
</head>

function PhaseBar({phase,selected,onClick}){
  const isDone=phase.status===STATUS.done,isActive=phase.status===STATUS.active;

}

            React.createElement('div',{className:"ad-timeline-num"},ph.id)
          ),
          React.createElement('div',{className:"ad-timeline-label"},ph.name.split(" ")[0])
        ))
      )

}

function AnalyticsTab({tasks}){
