<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Cowork Vocabulary Quiz</title>
  <style>
    /* =========================================
       THEME VARIABLES
       ========================================= */
    :root {
      /* Light Mode (Teachable Style) */
      --bg: #F7F9FA;
      --panel: #FFFFFF;
      --panel-alt: #F3F4F6;
      --text: #1F2937;
      --text-muted: #6B7280;
      
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      
      /* Accent colors inspired by FFA Logo */
      --accent: #2563EB; /* Bright Blue */
      --accent-light: #EFF6FF;
      --accent-hover: #1D4ED8;
      
      --success: #059669; /* Emerald */
      --success-light: #ECFDF5;
      
      --warning: #D97706; /* Amber */
      --warning-light: #FFFBEB;
      
      --error: #DC2626; /* Red */
      --error-light: #FEF2F2;

      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --radius: 12px;
      --radius-sm: 6px;
    }

    /* Dark Mode (Forced via Toggle) */
    :root[data-theme="dark"] {
      --bg: #111827; 
      --panel: #1F2937;
      --panel-alt: #374151;
      --text: #F9FAFB;
      --text-muted: #9CA3AF;
      
      --border: #374151;
      --border-strong: #4B5563;
      
      --accent: #3B82F6;
      --accent-light: rgba(59, 130, 246, 0.15);
      --accent-hover: #60A5FA;
      
      --success: #10B981;
      --success-light: rgba(16, 185, 129, 0.15);
      
      --warning: #F59E0B;
      --warning-light: rgba(245, 158, 11, 0.15);
      
      --error: #EF4444;
      --error-light: rgba(239, 68, 68, 0.15);

      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    }

    /* Dark Mode (System Preference Fallback) */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #111827; 
        --panel: #1F2937;
        --panel-alt: #374151;
        --text: #F9FAFB;
        --text-muted: #9CA3AF;
        
        --border: #374151;
        --border-strong: #4B5563;
        
        --accent: #3B82F6;
        --accent-light: rgba(59, 130, 246, 0.15);
        --accent-hover: #60A5FA;
        
        --success: #10B981;
        --success-light: rgba(16, 185, 129, 0.15);
        
        --warning: #F59E0B;
        --warning-light: rgba(245, 158, 11, 0.15);
        
        --error: #EF4444;
        --error-light: rgba(239, 68, 68, 0.15);

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
      }
    }

    /* =========================================
       GLOBAL STYLES
       ========================================= */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
    }

    .quiz-fs-wrap:fullscreen,
    .quiz-fs-wrap:-webkit-full-screen {
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
      background: var(--bg);
    }

    /* =========================================
       PANELS & LAYOUT
       ========================================= */
    .hero,
    .quiz-shell,
    .review-panel,
    .results-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 24px;
      align-items: center;
    }

    .hero-copy {
      min-width: 0;
    }

    .hero-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    .hero-topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      line-height: 1.2;
      font-weight: 700;
      color: var(--text);
    }

    .hero-logo-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .hero-logo {
      width: min(100%, 160px);
      height: auto;
      object-fit: contain;
    }

    .hero-status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--panel-alt);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .hero-fs-btn {
      appearance: none;
      border: 1px solid var(--border-strong);
      background: var(--panel);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .hero-fs-btn:hover {
      background: var(--panel-alt);
      border-color: var(--text-muted);
    }

    /* Screen Toggling */
    .screen { display: none; }
    #quizScreen.show { display: grid; }
    #reviewScreen.show,
    #resultsScreen.show { display: block; }

    /* Main Quiz Grid */
    .quiz-shell {
      display: grid;
      grid-template-columns: minmax(380px, 0.8fr) minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .bank {
      padding: 24px;
      background: var(--panel-alt);
      border-right: 1px solid var(--border);
      height: 100%;
    }

    .board {
      padding: 24px;
      background: var(--panel);
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .panel-copy {
      margin: 0 0 20px;
      color: var(--text-muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    /* Progress Bar */
    .page-head {
      margin-bottom: 24px;
    }

    .page-progress {
      width: 100%;
      max-width: 200px;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: 0 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* =========================================
       DRAG & DROP ELEMENTS
       ========================================= */
    .option-list,
    .task-grid {
      display: grid;
      gap: 12px;
    }

    .draggable {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      cursor: grab;
      user-select: none;
      transition: all 0.15s ease;
      line-height: 1.5;
      font-size: 0.9rem;
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .draggable:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    
    .draggable:hover .drag-handle {
      color: var(--text);
    }

    .draggable.dragging {
      opacity: 0.4;
      transform: scale(0.98);
      cursor: grabbing;
      box-shadow: none;
    }

    .drag-handle {
      flex-shrink: 0;
      color: var(--text-muted);
      margin-top: 2px;
      transition: color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .draggable-text {
      flex: 1;
    }

    .task-card {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid var(--accent-light);
    }

    .task-text {
      margin: 0 0 12px;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .dropzone {
      min-height: 72px;
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--panel-alt);
      color: var(--text-muted);
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .dropzone.over {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    .dropzone.filled {
      justify-content: stretch;
      padding: 0;
      border-style: solid;
      border-color: transparent;
      background: transparent;
    }

    .dropzone .draggable {
      width: 100%;
      border: 1px solid var(--accent);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
    }

    .empty-bank {
      padding: 20px;
      text-align: center;
      border-radius: var(--radius-sm);
      background: var(--success-light);
      border: 1px solid var(--success);
      color: var(--success);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* =========================================
       BUTTONS & CONTROLS
       ========================================= */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .controls-left,
    .controls-right {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: #FFFFFF;
      box-shadow: var(--shadow-sm);
    }
    
    .primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .success {
      background: var(--success);
      color: #FFFFFF;
      box-shadow: var(--shadow-sm);
    }

    .secondary {
      background: var(--panel);
      color: var(--text);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-sm);
    }
    
    .secondary:hover:not(:disabled) {
      background: var(--panel-alt);
    }

    /* =========================================
       REVIEW & RESULTS SCREENS
       ========================================= */
    .review-panel,
    .results-panel {
      padding: 32px;
    }

    .review-summary,
    .results-summary {
      margin-bottom: 24px;
      padding: 20px;
      border-radius: var(--radius);
      background: var(--panel-alt);
      border: 1px solid var(--border);
    }

    .review-list {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .review-card {
      padding: 20px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 4px solid var(--warning);
      box-shadow: var(--shadow-sm);
    }

    .review-card.correct-state {
      border-left-color: var(--success);
    }

    .review-label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .review-value {
      margin: 0 0 16px;
      line-height: 1.5;
      font-size: 0.95rem;
      color: var(--text);
    }
    .review-value:last-child { margin-bottom: 0; }

    .review-value.correct {
      color: var(--success);
      font-weight: 600;
    }

    .review-value.wrong {
      color: var(--error);
      text-decoration: line-through;
      opacity: 0.8;
    }

    .score {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
    }

    .score-note {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .results-summary.success-state {
      border-color: var(--success);
      background: var(--success-light);
    }
    .results-summary.success-state .score { color: var(--success); }

    .results-summary.retry-state {
      border-color: var(--warning);
      background: var(--warning-light);
    }
    .results-summary.retry-state .score { color: var(--warning); }

    /* =========================================
       MEDIA QUERIES
       ========================================= */
    @media (max-width: 980px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero-topbar {
        justify-content: center;
        flex-direction: column;
      }

      .hero-logo-wrap {
        justify-content: center;
        order: -1;
      }

      .hero-status {
        flex-direction: column;
        align-items: center;
      }

      .page-progress {
        justify-content: center;
      }

      .quiz-shell {
        grid-template-columns: 1fr;
      }

      .bank {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .controls,
      .page-head {
        flex-direction: column;
      }

      .controls-left,
      .controls-right,
      .page-status {
        width: 100%;
        justify-content: center;
      }

      .controls-left button,
      .controls-right button {
        flex: 1 1 auto;
      }
      
      .hero, .quiz-shell, .review-panel, .results-panel {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-fs-wrap" id="quiz-fs-wrap">
  <div class="wrap">
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-copy">
          <div class="hero-topbar">
            <div class="hero-heading">
              <h1>Claude Cowork Vocabulary Quiz</h1>
            </div>
            <div class="hero-topbar-actions">
              <button class="hero-fs-btn" id="themeBtn" type="button" aria-label="Toggle theme">
                <span id="themeBtnIcon" aria-hidden="true">💻</span>
                <span id="themeBtnLabel">System</span>
              </button>
              <button class="hero-fs-btn" id="quiz-fs-btn" type="button" aria-label="Enter fullscreen">
                <span aria-hidden="true">⛶</span>
                <span id="quiz-fs-btn-label">Fullscreen</span>
              </button>
            </div>
          </div>
          <div class="hero-status">
            <div class="page-status">
              <span class="pill" id="pageBadge">Group 1</span>
              <span class="pill" id="pageMatchCount">Matched 0 / 5</span>
            </div>
            <div id="pageProgress" class="page-progress" aria-hidden="true"></div>
          </div>
        </div>
        <div class="hero-logo-wrap">
          <img class="hero-logo" src="https://futurefictionacademy.com/wp-content/uploads/2023/05/FFA-Logo.png" alt="Future Fiction Academy logo">
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen show quiz-shell">
      <aside id="bankPanel" class="bank">
        <h2 class="panel-title">Definition Bank</h2>
        <p class="panel-copy">
          Drag each definition into the matching term card. You can move cards between terms or drag them back here to revise.
        </p>
        <div id="optionBank" class="option-list"></div>
      </aside>

      <section class="board">
        <div class="page-head">
          <div>
            <h2 class="panel-title" id="pageTitle">Group 1</h2>
            <p class="panel-copy" id="pageCopy"></p>
          </div>
        </div>
        <div id="taskGrid" class="task-grid"></div>

        <div class="controls">
          <div class="controls-left">
            <button id="prevBtn" class="secondary" type="button">Previous</button>
            <button id="nextBtn" class="secondary" type="button">Next</button>
          </div>
          <div class="controls-right">
            <button id="resetBtn" class="secondary" type="button">Reset Quiz</button>
            <button id="checkBtn" class="primary" type="button">Check My Answers</button>
          </div>
        </div>
      </section>
    </section>

    <section id="reviewScreen" class="screen review-panel">
      <div class="review-summary">
        <h2 class="panel-title">Review Missed Answers</h2>
        <p id="reviewSummary" class="panel-copy"></p>
      </div>
      <div id="reviewList" class="review-list"></div>
      <div class="controls">
        <div class="controls-left"></div>
        <div class="controls-right">
          <button id="reviewContinueBtn" class="primary" type="button">Continue to Results</button>
        </div>
      </div>
    </section>

    <section id="resultsScreen" class="screen results-panel">
      <div id="resultsSummary" class="results-summary">
        <p id="score" class="score"></p>
        <p id="scoreNote" class="score-note"></p>
      </div>
      <div class="controls">
        <div class="controls-left">
          <button id="reviewAgainBtn" class="secondary" type="button">Back to Review</button>
        </div>
        <div class="controls-right">
          <button id="retakeBtn" class="success" type="button">Retake Quiz</button>
        </div>
      </div>
    </section>
  </div>
  </div>

  <script>
    const rawQuestions = [
      {
        term: "Cowork",
        definition: "A mode in the Claude desktop app that connects Claude to a folder on your computer. Unlike Chat (conversation only) or Projects (uploaded docs), Cowork lets Claude actually create, read, edit, and delete real files on your machine.",
        section: "Your Working Environment"
      },
      {
        term: "Workspace",
        definition: "The folder on your computer that you link to a Cowork session. Claude can only see what is inside this folder and its subfolders. Everything else on your machine is invisible to it.",
        section: "Your Working Environment"
      },
      {
        term: "Session",
        definition: "One continuous interaction with Claude in Cowork. When the session ends, Claude's temporary working memory is wiped. Only files saved to your workspace survive.",
        section: "Your Working Environment"
      },
      {
        term: "CLAUDE.md",
        definition: "A markdown file in your workspace that Claude reads automatically when a session starts. Think of it as the project's brain: it tells Claude what the project is about, what has been done, and how to behave.",
        section: "Your Working Environment"
      },
      {
        term: "Scratch Pad",
        definition: "Claude's temporary working area inside its sandbox. Files created here disappear when the session ends. Think of it as a whiteboard that gets erased.",
        section: "Your Working Environment"
      },
      {
        term: "VM (Virtual Machine)",
        definition: "The sandboxed computer environment Claude runs inside. It is isolated from the rest of your Mac and can only access your mounted workspace folder.",
        section: "How Claude Works Under the Hood"
      },
      {
        term: "Mount / /mnt/",
        definition: "The bridge between Claude's sandbox and your real folder. When Claude saves a file to /mnt/, it appears in your workspace folder on disk.",
        section: "How Claude Works Under the Hood"
      },
      {
        term: "Compaction",
        definition: "When a conversation gets too long for Claude's memory, it automatically summarizes and trims earlier parts while trying to preserve key decisions.",
        section: "How Claude Works Under the Hood"
      },
      {
        term: "Context Window",
        definition: "The total amount of text Claude can hold in memory at once. When the conversation exceeds this, compaction happens.",
        section: "How Claude Works Under the Hood"
      },
      {
        term: "Skills",
        definition: "Reusable capability modules that extend what Claude can do. Some are built-in and others are personal skills you install or create.",
        section: "How Claude Works Under the Hood"
      },
      {
        term: "CRUD",
        definition: "Create, Read, Update, Delete. These are the four basic operations you can perform on a file.",
        section: "Files and Formats"
      },
      {
        term: "Markdown (.md)",
        definition: "A lightweight text format that uses simple symbols like # for headings and - for lists to add structure. It is human-readable and widely supported.",
        section: "Files and Formats"
      },
      {
        term: "CSV (Comma-Separated Values)",
        definition: "A plain-text file where data is separated by commas. It is essentially a spreadsheet without formatting, tabs, or formulas.",
        section: "Files and Formats"
      },
      {
        term: "XLSX",
        definition: "Microsoft Excel's file format. It supports tabs, colors, formulas, and formatting.",
        section: "Files and Formats"
      },
      {
        term: "DOCX",
        definition: "Microsoft Word's file format. It supports rich text, tables, and fillable forms.",
        section: "Files and Formats"
      },
      {
        term: "PPTX",
        definition: "Microsoft PowerPoint's file format.",
        section: "Files and Formats"
      },
      {
        term: "PDF",
        definition: "A fixed-layout document format. Claude can create and read PDFs, but editing an existing one is more like rebuilding it from scratch.",
        section: "Files and Formats"
      },
      {
        term: "SVG (Scalable Vector Graphics)",
        definition: "An image format defined by math rather than pixels, so it scales without losing quality.",
        section: "Files and Formats"
      },
      {
        term: "JSON (JavaScript Object Notation)",
        definition: "A structured data format using key-value pairs. It is commonly used to pass information between systems.",
        section: "Files and Formats"
      },
      {
        term: "HTML",
        definition: "The standard language for structuring web pages.",
        section: "Files and Formats"
      },
      {
        term: "Frontmatter",
        definition: "A block of metadata at the top of a markdown file, written in YAML and enclosed between --- lines. Apps can read it automatically.",
        section: "Frontmatter and Schemas"
      },
      {
        term: "YAML",

      {

      },
      {

        definition: "The programming language that makes web pages interactive.",
        section: "Web and Interactivity"
      },
      {
        term: "React",
        definition: "A JavaScript framework for building user interfaces out of reusable components.",
        section: "Web and Interactivity"
      },
      {

      {

      {

        section: "Debugging Essentials"
      },
      {

        section: "Debugging Essentials"
      },
      {
        term: "Import Statement",
        definition: "A line at the top of a code file that pulls in a library. When an import fails, everything that depends on that library breaks.",
        section: "Debugging Essentials"
      },
      {
        term: "Hardcoded",
        definition: "Data written directly into the code rather than entered by the user or loaded from a file.",
        section: "Development Concepts"
      },
      {
        term: "MVP (Minimum Viable Product)",
        definition: "The simplest version of an app that works and is useful.",
        section: "Development Concepts"
      },
      {
        term: "Vibe Coding",
        definition: "A collaborative style of development where a human describes what they want in plain language and AI writes the code, with both iterating together in real time.",
        section: "Development Concepts"
      },
      {
        term: "Inline Editing",
        definition: "Clicking directly on displayed text to edit it in place instead of opening a separate edit screen.",
        section: "Development Concepts"
      },
      {
        term: "Auto-Save",
        definition: "The app saves your changes automatically whenever you make them, without needing a Save button.",
        section: "Development Concepts"
      },
      {
        term: "QA (Quality Assurance)",
        definition: "The process of checking that output meets expectations.",
        section: "Development Concepts"
      },
      {
        term: "Symlink (Symbolic Link)",
        definition: "A file that acts as a shortcut to another location on your computer.",
        section: "System and Filesystem"
      },
      {
        term: "Home Directory (~)",
        definition: "Your user folder on macOS, such as /Users/yourname/. Cowork restricts workspaces to paths inside this directory.",
        section: "System and Filesystem"
      },
      {
        term: ".env File",
        definition: "A plain-text file for storing secrets like API keys and passwords so they are not written directly into code.",
        section: "System and Filesystem"
      },
      {
        term: "API Key",
        definition: "A unique string that grants your app access to an external service and should be stored in an .env file or equivalent, not directly in code.",
        section: "System and Filesystem"
      }
    ];

    const QUESTIONS_PER_GROUP = 5;
    const TOTAL_PAGES = Math.ceil(rawQuestions.length / QUESTIONS_PER_GROUP);

    const questions = rawQuestions.map((question, index) => {
      const page = Math.floor(index / QUESTIONS_PER_GROUP) + 1;

      return {
        id: `q${index + 1}`,
        optionId: `opt-${index + 1}`,
        page,
        ...question
      };
    });

    const optionById = Object.fromEntries(
      questions.map((question) => [
        question.optionId,
        {
          id: question.optionId,
          label: question.definition,
          page: question.page
        }
      ])
    );

    const bankPanel = document.getElementById("bankPanel");
    const optionBank = document.getElementById("optionBank");
    const taskGrid = document.getElementById("taskGrid");
    const pageTitle = document.getElementById("pageTitle");
    const pageCopy = document.getElementById("pageCopy");
    const pageBadge = document.getElementById("pageBadge");
    const pageMatchCount = document.getElementById("pageMatchCount");
    const pageProgress = document.getElementById("pageProgress");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const quizScreen = document.getElementById("quizScreen");
    const reviewScreen = document.getElementById("reviewScreen");
    const resultsScreen = document.getElementById("resultsScreen");
    const reviewSummary = document.getElementById("reviewSummary");
    const reviewList = document.getElementById("reviewList");
    const reviewContinueBtn = document.getElementById("reviewContinueBtn");
    const reviewAgainBtn = document.getElementById("reviewAgainBtn");
    const resultsSummary = document.getElementById("resultsSummary");
    const scoreEl = document.getElementById("score");
    const scoreNoteEl = document.getElementById("scoreNote");
    const retakeBtn = document.getElementById("retakeBtn");
    const quizFsWrap = document.getElementById("quiz-fs-wrap");
    const quizFsBtn = document.getElementById("quiz-fs-btn");
    const quizFsBtnLabel = document.getElementById("quiz-fs-btn-label");
    const themeBtn = document.getElementById("themeBtn");
    const themeBtnIcon = document.getElementById("themeBtnIcon");
    const themeBtnLabel = document.getElementById("themeBtnLabel");

    const state = {
      currentPage: 1,
      stage: "quiz",
      placements: createPlacements(),
      pageOrders: createPageOrders(),
      results: null
    };

    let draggedId = null;

    function createPlacements() {
      return Object.fromEntries(questions.map((question) => [question.id, null]));
    }

    function toggleFullscreen() {
      if (!quizFsWrap) return;

      if (!document.fullscreenElement) {
        quizFsWrap.requestFullscreen().catch((err) => console.warn("Fullscreen error:", err));
      } else {
        document.exitFullscreen();
      }
    }

    function syncFullscreenButton() {
      if (!quizFsBtn || !quizFsBtnLabel) return;
      const isFullscreen = document.fullscreenElement === quizFsWrap;
      quizFsBtnLabel.textContent = isFullscreen ? "Exit Fullscreen" : "Fullscreen";
      quizFsBtn.setAttribute("aria-label", isFullscreen ? "Exit fullscreen" : "Enter fullscreen");
    }

    // --- Theme Logic ---
    const themes = ['system', 'light', 'dark'];
    const themeIcons = { system: '💻', light: '☀️', dark: '🌙' };
    const themeLabels = { system: 'System', light: 'Light', dark: 'Dark' };
    
    const systemThemeQuery = window.matchMedia?.('(prefers-color-scheme: dark)') ?? null;
    let currentTheme = 'system';
    try {
      const savedTheme = localStorage.getItem('theme-pref');
      if (themes.includes(savedTheme)) {
        currentTheme = savedTheme;
      }
    } catch (e) {
      console.warn('localStorage not available for theme preferences');
    }

    function applyTheme(theme) {
      if (theme === 'system') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }
      
      if (themeBtnIcon && themeBtnLabel) {
        themeBtnIcon.textContent = themeIcons[theme];
        themeBtnLabel.textContent = themeLabels[theme];
      }
      
      try {
        localStorage.setItem('theme-pref', theme);
      } catch (e) {}
    }

    themeBtn?.addEventListener('click', () => {
      const currentIndex = themes.indexOf(currentTheme);
      currentTheme = themes[(currentIndex + 1) % themes.length];
      applyTheme(currentTheme);
    });

    if (systemThemeQuery) {
      const refreshSystemTheme = () => {
        if (currentTheme === 'system') {
          applyTheme('system');
        }
      };

      if (typeof systemThemeQuery.addEventListener === 'function') {
        systemThemeQuery.addEventListener('change', refreshSystemTheme);
      } else if (typeof systemThemeQuery.addListener === 'function') {
        systemThemeQuery.addListener(refreshSystemTheme);
      }
    }

    // Initialize Theme
    applyTheme(currentTheme);

    function shuffle(array) {
      const copy = [...array];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function createPageOrders() {
      const orders = {};

      for (let page = 1; page <= TOTAL_PAGES; page += 1) {
        const pageOptionIds = questions
          .filter((question) => question.page === page)
          .map((question) => question.optionId);

        orders[page] = shuffle(pageOptionIds);
      }

      return orders;
    }

    function getQuestionsForPage(page) {
      return questions.filter((question) => question.page === page);
    }

    function getQuestionById(questionId) {
      return questions.find((question) => question.id === questionId);
    }

    function getOptionLabel(optionId) {
      return optionId ? optionById[optionId]?.label || "" : "";
    }

    function findPlacementForOption(optionId) {
      return questions.find((question) => state.placements[question.id] === optionId) || null;
    }

    function setStage(stage) {
      state.stage = stage;
      quizScreen.classList.toggle("show", stage === "quiz");
      reviewScreen.classList.toggle("show", stage === "review");
      resultsScreen.classList.toggle("show", stage === "results");
    }

    function createDraggable(option) {
      const card = document.createElement("div");
      card.className = "draggable";
      card.draggable = true;
      card.id = option.id;

      // SVG Grip Icon
      const grip = document.createElement("div");
      grip.className = "drag-handle";
      grip.innerHTML = `<svg width="12" height="20" viewBox="0 0 12 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="4" cy="4" r="1.5"/><circle cx="8" cy="4" r="1.5"/><circle cx="4" cy="10" r="1.5"/><circle cx="8" cy="10" r="1.5"/><circle cx="4" cy="16" r="1.5"/><circle cx="8" cy="16" r="1.5"/></svg>`;

      const text = document.createElement("span");
      text.className = "draggable-text";
      text.textContent = option.label;

      card.appendChild(grip);
      card.appendChild(text);

      card.addEventListener("dragstart", () => {
        draggedId = option.id;
        card.classList.add("dragging");
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
      });

      return card;
    }

    function updateProgressDots() {
      pageProgress.innerHTML = "";
      
      const fill = document.createElement("div");
      fill.className = "progress-fill";
      
      const progressPercent = (state.currentPage / TOTAL_PAGES) * 100;
      fill.style.width = `${progressPercent}%`;
      
      pageProgress.appendChild(fill);
    }

    function renderBank(pageQuestions) {
      optionBank.innerHTML = "";

      const bankOptions = state.pageOrders[state.currentPage]
        .filter((optionId) => !pageQuestions.some((question) => state.placements[question.id] === optionId))
        .map((optionId) => optionById[optionId]);

      if (!bankOptions.length) {
        const emptyState = document.createElement("div");
        emptyState.className = "empty-bank";
        emptyState.textContent = "All definitions on this screen have been placed. Drag a card back here if you want to change an answer.";
        optionBank.appendChild(emptyState);
        return;
      }

      bankOptions.forEach((option) => optionBank.appendChild(createDraggable(option)));
    }

    function renderTasks(pageQuestions) {
      taskGrid.innerHTML = "";

      pageQuestions.forEach((question, index) => {
        const card = document.createElement("div");
        card.className = "task-card";
        card.dataset.questionId = question.id;

        const prompt = document.createElement("p");
        prompt.className = "task-text";
        prompt.textContent = `${index + 1}. ${question.term}`;

        const dropzone = document.createElement("div");
        dropzone.className = "dropzone";
        dropzone.dataset.questionId = question.id;

        const placedOptionId = state.placements[question.id];

        if (placedOptionId) {
          dropzone.classList.add("filled");
          dropzone.appendChild(createDraggable(optionById[placedOptionId]));
        } else {
          dropzone.textContent = "Drop the matching definition here";
        }

        dropzone.addEventListener("dragover", (event) => {
          event.preventDefault();
          dropzone.classList.add("over");
        });

        dropzone.addEventListener("dragleave", () => {
          dropzone.classList.remove("over");
        });

        dropzone.addEventListener("drop", (event) => {
          event.preventDefault();
          dropzone.classList.remove("over");
          if (!draggedId) return;

          const currentQuestion = getQuestionById(dropzone.dataset.questionId);
          if (!currentQuestion) return;

          const previousQuestion = findPlacementForOption(draggedId);
          if (previousQuestion) {
            state.placements[previousQuestion.id] = null;
          }

          state.placements[currentQuestion.id] = draggedId;
          renderQuiz();
        });

        card.appendChild(prompt);
        card.appendChild(dropzone);
        taskGrid.appendChild(card);
      });
    }

    function renderQuiz() {
      const pageQuestions = getQuestionsForPage(state.currentPage);
      const matchedCount = pageQuestions.filter((question) => state.placements[question.id]).length;

      // Extract unique sections to display in the header
      const pageSections = [...new Set(pageQuestions.map(q => q.section))];

      pageTitle.textContent = `Group ${state.currentPage}: ${pageSections.join(' & ')}`;
      pageCopy.textContent = `Match ${pageQuestions.length} terms to the correct definitions in this group.`;
      pageBadge.textContent = `Group ${state.currentPage} of ${TOTAL_PAGES}`;
      pageMatchCount.textContent = `Matched ${matchedCount} / ${pageQuestions.length}`;

      prevBtn.disabled = state.currentPage === 1;
      nextBtn.disabled = state.currentPage === TOTAL_PAGES;
      checkBtn.style.display = state.currentPage === TOTAL_PAGES ? "inline-flex" : "none";

      updateProgressDots();
      renderBank(pageQuestions);
      renderTasks(pageQuestions);
    }

    function buildResults() {
      const missed = questions
        .filter((question) => state.placements[question.id] !== question.optionId)
        .map((question) => ({
          term: question.term,
          section: question.section,
          chosenDefinition: getOptionLabel(state.placements[question.id]) || "Not answered",
          correctDefinition: question.definition
        }));

      const correctCount = questions.length - missed.length;
      const percent = Math.round((correctCount / questions.length) * 1000) / 10;

      return {
        correctCount,
        total: questions.length,
        percent,
        missed
      };
    }

    function renderReview() {
      const { missed } = state.results;

      reviewList.innerHTML = "";

      if (!missed.length) {
        reviewSummary.textContent = "You did not miss any terms. Review is complete, so you can continue straight to your final score.";

        const successCard = document.createElement("div");
        successCard.className = "review-card correct-state";
        successCard.innerHTML = `
          <span class="review-label">All correct</span>
          <p class="review-value correct">Every term was matched to the right definition.</p>
        `;
        reviewList.appendChild(successCard);
        return;
      }

      reviewSummary.textContent = `You missed ${missed.length} term${missed.length === 1 ? "" : "s"}. Review the corrections below before continuing to your final score.`;

      missed.forEach((item) => {
        const card = document.createElement("div");
        card.className = "review-card";
        card.innerHTML = `
          <div class="task-meta"><span class="section-tag">${item.section}</span></div>
          <p class="task-text">${item.term}</p>
          <span class="review-label">Your answer</span>
          <p class="review-value wrong">${item.chosenDefinition}</p>
          <span class="review-label">Correct answer</span>
          <p class="review-value correct">${item.correctDefinition}</p>
        `;
        reviewList.appendChild(card);
      });
    }

    function renderResults() {
      const { correctCount, total, percent, missed } = state.results;
      const passed = percent >= 90;

      resultsSummary.classList.toggle("success-state", passed);
      resultsSummary.classList.toggle("retry-state", !passed);

      scoreEl.textContent = `Score: ${correctCount} / ${total} (${percent}%)`;

      if (passed) {
        scoreNoteEl.innerHTML = "<strong>Congratulations.</strong> You scored 90% or higher and showed strong command of the Claude Cowork vocabulary.";
      } else {
        scoreNoteEl.innerHTML = `<strong>Good effort.</strong> Review the ${missed.length} missed term${missed.length === 1 ? "" : "s"} above and retake the quiz to improve your score.`;
      }

      retakeBtn.style.display = passed ? "none" : "inline-flex";
      reviewAgainBtn.style.display = missed.length ? "inline-flex" : "none";
    }

    function checkAnswers() {
      state.results = buildResults();
      renderReview();
      renderResults();
      setStage("review");
    }

    function resetQuiz() {
      state.currentPage = 1;
      state.stage = "quiz";
      state.placements = createPlacements();
      state.pageOrders = createPageOrders();
      state.results = null;
      draggedId = null;
      setStage("quiz");
      renderQuiz();
    }

    prevBtn.addEventListener("click", () => {
      if (state.currentPage === 1) return;
      state.currentPage -= 1;
      renderQuiz();
    });

    nextBtn.addEventListener("click", () => {
      if (state.currentPage === TOTAL_PAGES) return;
      state.currentPage += 1;
      renderQuiz();
    });

    checkBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetQuiz);

    reviewContinueBtn.addEventListener("click", () => {
      setStage("results");
    });

    reviewAgainBtn.addEventListener("click", () => {
      if (!state.results) return;
      setStage("review");
    });

    retakeBtn.addEventListener("click", resetQuiz);
    quizFsBtn?.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", syncFullscreenButton);

    bankPanel.addEventListener("dragover", (event) => {
      event.preventDefault();
      bankPanel.classList.add("over");
    });

    bankPanel.addEventListener("dragleave", (event) => {
      if (!bankPanel.contains(event.relatedTarget)) {
        bankPanel.classList.remove("over");
      }
    });

    bankPanel.addEventListener("drop", (event) => {
      event.preventDefault();
      bankPanel.classList.remove("over");
      if (!draggedId) return;

      const previousQuestion = findPlacementForOption(draggedId);
      if (previousQuestion) {
        state.placements[previousQuestion.id] = null;
      }

      renderQuiz();
    });

    renderQuiz();
    syncFullscreenButton();
  </script>
</body>
</html>
